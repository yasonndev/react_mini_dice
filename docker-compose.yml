version: '3.8'

services:
  tg_mini_dice:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18001:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Нужно для корректного hot-reload в Windows/Mac
    stdin_open: true
    tty: true